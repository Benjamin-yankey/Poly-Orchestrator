# Local verification of the full 3-tier stack.
#   docker compose up --build
#   open http://localhost:8080
#
# Service names (postgres, redis, products, cart) ARE the service-discovery DNS names
# here — Docker's built-in DNS resolves them, exactly like Cloud Map on ECS or
# kube-dns on EKS. The container images are identical to what we push to ECR.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shopnow
      POSTGRES_PASSWORD: shopnow_pass
      POSTGRES_DB: shopnow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopnow"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Adminer — web UI to browse/edit the Postgres data at http://localhost:8082
  # (Host 8080 is Jenkins, 8081 is the frontend.) Log in with:
  #   System: PostgreSQL · Server: postgres · User: shopnow · Password: shopnow_pass · DB: shopnow
  adminer:
    image: adminer:4
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "127.0.0.1:8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Products / core API microservice — owns Postgres (catalog, users, orders).
  products:
    build: ./app/products
    environment:
      PG_HOST: postgres
      PG_USER: shopnow
      PG_PASSWORD: shopnow_pass
      PG_DATABASE: shopnow
      # Shared signing secret for JWTs — MUST match the cart service.
      JWT_SECRET: ${JWT_SECRET:-shopnow_dev_secret_change_me}
    depends_on:
      postgres:
        condition: service_healthy

  # Cart microservice — owns Redis (per-user carts). Verifies the same JWTs.
  cart:
    build: ./app/cart
    environment:
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-shopnow_dev_secret_change_me}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./app/frontend
    environment:
      PRODUCTS_URL: http://products:5001
      CART_URL: http://cart:5002
    ports:
      # Host 8081 -> container 8080. Host 8080 is reserved for Jenkins.
      - "8081:8080"
    depends_on:
      - products
      - cart

volumes:
  pgdata:
