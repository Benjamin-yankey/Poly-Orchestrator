# Public entrypoint for EKS, equivalent to the ECS ALB.
# Requires the AWS Load Balancer Controller to be installed in the cluster
# (see README "EKS deployment" step 3). The controller reads these annotations
# and provisions a real internet-facing Application Load Balancer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopnow
  namespace: shopnow
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
